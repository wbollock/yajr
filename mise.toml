[tools]
python = "3.12"

[env]
PYTHONPATH = "src"

[tasks.install]
description = "Sync project dependencies from lockfile"
run = "python -m pip install -q uv && python -m uv pip sync requirements.lock.txt"

[tasks.lock]
description = "Regenerate lockfile from pyproject"
run = "python -m pip install -q uv && python -m uv pip compile pyproject.toml --extra dev --extra ansible --extra salt -o requirements.lock.txt --python-version 3.12"

[tasks.test]
description = "Run test suite"
run = "pytest -q"

[tasks.run]
description = "Run YAJR locally"
run = "python -m pip install -q uv && python -m uv run uvicorn jinja_parser.web.app:app --host 0.0.0.0 --port 8000 --reload"
